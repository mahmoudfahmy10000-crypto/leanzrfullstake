version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: leanzer
      POSTGRES_USER: leanzer
      POSTGRES_PASSWORD: leanzer
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://leanzer:leanzer@db:5432/leanzer
      JWT_SECRET: change-me
    depends_on:
      - db
    ports:
      - "4000:4000"
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  pgdata:
